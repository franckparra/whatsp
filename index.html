<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Whats Personas – Seleção</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#25D366">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* -------------------------------------------------
     Paleta de cores do WhatsApp (versão Web)
     ------------------------------------------------- */
  :root{
    --wp-green:#0C3619;          /* barra superior, botões */
    --wp-green-dark:#128C7E;     /* estado ativo, hover */
    --wp-gray-light:#EEEBE2;     /* fundo da página */
    --wp-gray-dark:#D9D9D9;      /* bordas, sombras */
    --wp-text-dark:#104720;      /* texto principal */
    --wp-text-muted:#2D3843;     /* texto secundário */
    --wp-white:#FFFFFF;
  }
  /* -------------------------------------------------
     Reset & layout geral
     ------------------------------------------------- */
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Inter',sans-serif;
    background:var(--wp-gray-light);
    color:var(--wp-text-dark);
    display:flex;
    flex-direction:column;
    height:100vh;
  }
  /* -------------------------------------------------
     HEADER (barra superior do WhatsApp)
     ------------------------------------------------- */
  header{
    background:var(--wp-green);
    color:var(--wp-white);
    padding:1rem 1.5rem;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid var(--wp-gray-dark);
    box-shadow:0 4px 8px rgba(0,0,0,.1);
  }
  .header-left{display:flex;align-items:center;gap:0.8rem}
  .app-avatar{
    width:42px;height:42px;
    border-radius:50%;
    border:2px solid var(--wp-white);
    background:var(--wp-gray-dark);
    display:flex;align-items:center;justify-content:center;
    font-size:1.2rem;color:var(--wp-white);
    font-weight:600;
  }
  .header-info h1{font-size:0.88rem;font-weight:600;color:var(--wp-white);line-height:1.2}
  .header-info p{font-size:0.7rem;color:var(--wp-gray-light);margin-top:1px}
  .header-right{display:flex;align-items:center;gap:0.8rem}
  .header-status{
    display:flex;align-items:center;gap:0.35rem;
    font-size:0.58rem;color:var(--wp-gray-light);
    letter-spacing:0.06em;text-transform:uppercase;
  }
  /* -------------------------------------------------
     LISTA DE PERSONAS – empilhada à esquerda
     ------------------------------------------------- */
  .list{
    display:flex;
    flex-direction:column;
    gap:1rem;
    padding:1rem;
    overflow-y:auto;
    flex:1;
  }
  .card{
    background:transparent;               /* sem fundo */
    border:1px solid var(--wp-gray-dark);
    border-radius:12px;
    text-align:left;
    padding:1rem;
    cursor:pointer;
    transition:transform .2s,box-shadow .2s;
    max-width:260px;                     /* largura máxima para não ocupar a tela inteira */
    box-shadow:0 2px 6px rgba(0,0,0,.1);
  }
  .card:hover{
    transform:scale(1.02);
    box-shadow:0 6px 12px rgba(0,0,0,.15);
  }
  .avatar{
    width:60px;height:60px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:0.4rem;
    border:2px solid var(--wp-green);
    background:var(--wp-gray-dark);
  }
  .name{
    font-weight:600;
    color:var(--wp-text-dark);
    font-size:0.9rem;
    margin-bottom:0.15rem;
  }
  .badge{
    font-size:0.68rem;
    color:var(--wp-text-muted);
  }
  /* -------------------------------------------------
     FOOTER / DISCLAIMER
     ------------------------------------------------- */
  .disclaimer{
    text-align:center;
    font-size:0.70rem;
    color:var(--wp-text-muted);
    padding:0.2rem 1rem;
    background:var(--wp-white);
    border-top:1px solid var(--wp-gray-dark);
    flex-shrink:0;
    letter-spacing:0.04em;
  }
  
  /* -------------------------------------------------
     Media Queries for Responsiveness
     ------------------------------------------------- */
  @media (max-width: 600px) {
    .list {
      padding:1rem 0.5rem;
    }
    .card {
      max-width:100%;
    }
  }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="app-avatar">WP</div>
    <div class="header-info">
      <h1>Whats Personas</h1>
      <p>Selecione uma persona para conversar</p>
    </div>
  </div>
</header>
<!-- LISTA VERTICAL DE PERSONAS -->
<div class="list" id="personaList">
  <!-- Cards gerados dinamicamente -->
</div>
<div class="disclaimer">TOKEN - Synthetic Language Personas – <a href="https://tokenslp.com.br" target="_blank" rel="noopener" style="color:#00e5ff;">tokenslp.com.br</a></div>
<script>
/* -------------------------------------------------
   Dados das personas (mesmo formato usado em chat.html)
   ------------------------------------------------- */
const PERSONAS = {
  "maria":{
    "nome":"Maria Clara",
    "avatar":"maria.jpg",
    "badge":"31 anos - Rio de Janeiro - RJ",
    "apiUrl":"https://api.zap01.tokenslp.com.br"
  },
  "laura":{
    "nome":"Laura Oliveira",
    "avatar":"laura.jpg",
    "badge":"28 anos - Rio de Janeiro - RJ",
    "apiUrl":"https://api.zap02.tokenslp.com.br"
  },
  "fernanda":{
    "nome":"Fernanda Ribeiro",
    "avatar":"fernanda.jpg",
    "badge":"38 anos - Belo Horizonte - MG",
    "apiUrl":"https://api.zap03.tokenslp.com.br"
  },
  "flavio":{
    "nome":"Flávio Carvalho",
    "avatar":"flavio.jpg",
    "badge":"31 anos - Porto Alegre - RS",
    "apiUrl":"https://api.zap04.tokenslp.com.br"
  },
  "ricardo":{
    "nome":"Ricardo Costa",
    "avatar":"ricardo.jpg",
    "badge":"40 anos - Salvador - BA",
    "apiUrl":"https://api.zap05.tokenslp.com.br"
  },
  "tiago":{
    "nome":"Tiago Martins",
    "avatar":"tiago.jpg",
    "badge":"47 anos - Curitiba - PR",
    "apiUrl":"https://api.zap06.tokenslp.com.br"
  }
};
/* -------------------------------------------------
   Gerar os cards de seleção  (empilhados à esquerda)
   ------------------------------------------------- */
function renderCards(){
  const list = document.getElementById('personaList');
  Object.entries(PERSONAS).forEach(([id, p]) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => location.href = `chat.html?p=${id}`;
    card.innerHTML = `
      <img src="${p.avatar}" alt="${p.nome}" class="avatar" onerror="this.src='https://via.placeholder.com/60'">
      <div class="name">${p.nome}</div>
      <div class="badge">${p.badge}</div>`;
    list.appendChild(card);
  });
}
/* -------------------------------------------------
   Inicialização
   ------------------------------------------------- */
renderCards();
</script>
</body>
</html>
